<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes Hub</title>
    <meta name="description" content="Stay updated with the latest BigQuery features, changes, and deprecations. Select updates and tweet about them.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="/static/style.css">
    <!-- Favicon placeholder or styling -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
</head>
<body>
    <div class="bg-gradient-glow">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        
        <!-- 3D Floating Elements -->
        <div class="floating-object obj-bq-db">
            <svg viewBox="0 0 120 120" width="170" height="170">
                <defs>
                    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#60a5fa" />
                        <stop offset="100%" stop-color="#1d4ed8" />
                    </linearGradient>
                    <linearGradient id="dbTopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#93c5fd" />
                        <stop offset="100%" stop-color="#3b82f6" />
                    </linearGradient>
                </defs>
                <path d="M10 30 C 10 15, 110 15, 110 30 L 110 50 C 110 65, 10 65, 10 50 Z" fill="url(#dbGrad)" />
                <ellipse cx="60" cy="30" rx="50" ry="15" fill="url(#dbTopGrad)" />
                
                <path d="M10 60 C 10 45, 110 45, 110 60 L 110 80 C 110 95, 10 95, 10 80 Z" fill="url(#dbGrad)" />
                <ellipse cx="60" cy="60" rx="50" ry="15" fill="url(#dbTopGrad)" />
                
                <path d="M10 90 C 10 75, 110 75, 110 90 L 110 110 C 110 125, 10 125, 10 110 Z" fill="url(#dbGrad)" />
                <ellipse cx="60" cy="90" rx="50" ry="15" fill="url(#dbTopGrad)" />
            </svg>
        </div>
        
        <div class="floating-object obj-tw-logo">
            <svg viewBox="0 0 100 100" width="140" height="140">
                <defs>
                    <linearGradient id="twGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#38bdf8" />
                        <stop offset="100%" stop-color="#0284c7" />
                    </linearGradient>
                    <filter id="shadow3d">
                        <feDropShadow dx="4" dy="8" stdDeviation="4" flood-opacity="0.3"/>
                    </filter>
                </defs>
                <g filter="url(#shadow3d)">
                    <rect x="15" y="15" width="70" height="50" rx="15" fill="url(#twGrad)" />
                    <path d="M30 65 L 20 80 L 45 65 Z" fill="url(#twGrad)" />
                    <path d="M38 30 H 45 L 62 50 H 55 Z" fill="#ffffff" opacity="0.9" />
                    <path d="M62 30 H 55 L 38 50 H 45 Z" fill="#ffffff" opacity="0.9" />
                </g>
            </svg>
        </div>
        
        <div class="floating-object obj-bq-chart">
            <svg viewBox="0 0 120 120" width="150" height="150">
                <defs>
                    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#f472b6" />
                        <stop offset="100%" stop-color="#be185d" />
                    </linearGradient>
                    <linearGradient id="chartSideGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ec4899" />
                        <stop offset="100%" stop-color="#9d174d" />
                    </linearGradient>
                </defs>
                <path d="M20 90 L 40 75 L 40 110 L 20 110 Z" fill="url(#chartSideGrad)" />
                <path d="M40 75 L 60 90 L 60 110 L 40 110 Z" fill="url(#chartGrad)" />
                <path d="M20 90 L 40 75 L 60 90 L 40 105 Z" fill="#fbcfe8" opacity="0.6" />
                
                <path d="M65 50 L 85 35 L 85 110 L 65 110 Z" fill="url(#chartSideGrad)" />
                <path d="M85 35 L 105 50 L 105 110 L 85 110 Z" fill="url(#chartGrad)" />
                <path d="M65 50 L 85 35 L 105 50 L 85 65 Z" fill="#fbcfe8" opacity="0.6" />
            </svg>
        </div>

        <div class="floating-object obj-bq-loop">
            <svg viewBox="0 0 100 100" width="130" height="130">
                <defs>
                    <linearGradient id="loopGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#34d399" />
                        <stop offset="100%" stop-color="#059669" />
                    </linearGradient>
                </defs>
                <circle cx="50" cy="50" r="30" stroke="url(#loopGrad)" stroke-width="12" fill="none" opacity="0.8" />
                <ellipse cx="50" cy="50" rx="30" ry="10" stroke="#a7f3d0" stroke-width="3" fill="none" opacity="0.6" transform="rotate(45 50 50)" />
            </svg>
        </div>

        <div class="floating-object obj-bq-nodes">
            <svg viewBox="0 0 100 100" width="120" height="120">
                <defs>
                    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#fbbf24" />
                        <stop offset="100%" stop-color="#d97706" />
                    </linearGradient>
                </defs>
                <line x1="20" y1="20" x2="50" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
                <line x1="80" y1="20" x2="50" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
                <line x1="50" y1="80" x2="50" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
                <circle cx="20" cy="20" r="10" fill="url(#nodeGrad)" />
                <circle cx="80" cy="20" r="12" fill="url(#nodeGrad)" />
                <circle cx="50" cy="80" r="8" fill="url(#nodeGrad)" />
                <circle cx="50" cy="50" r="14" fill="#fb7185" />
            </svg>
        </div>
    </div>
    
    <header class="app-header">
        <div class="container header-container">
            <div class="logo-area">
                <span class="logo-icon">⚡</span>
                <h1>BigQuery <span class="gradient-text">Release Notes</span></h1>
            </div>
            <div class="actions-area">
                <button id="theme-toggle-btn" class="btn btn-outline" style="padding: 0.6rem;" aria-label="Toggle light/dark theme">
                    <svg class="theme-sun-icon hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="18" height="18">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m0 13.5V21M4.22 4.22l1.58 1.58m12.42 12.42 1.58 1.58M3 12h2.25m13.5 0H21M5.8 18.2l-1.58 1.58m12.42-12.42 1.58-1.58M12 7.5a4.5 4.5 0 100 9 4.5 4.5 0 000-9z" />
                    </svg>
                    <svg class="theme-moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="18" height="18">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 12.83A9.53 9.53 0 0112 3.47c-.092 0-.184.004-.275.01a7.5 7.5 0 1010.5 10.5c.006-.091.01-.183.01-.275z" />
                    </svg>
                </button>
                <button id="export-csv-btn" class="btn btn-outline" aria-label="Export to CSV">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="18" height="18">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
                    </svg>
                    <span>Export CSV</span>
                </button>
                <button id="refresh-btn" class="btn btn-primary" aria-label="Refresh release notes">
                    <svg class="spinner-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" width="20" height="20">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span>Refresh</span>
                </button>
            </div>
        </div>
    </header>

    <main class="container main-layout">
        <section class="feed-section">
            <div class="section-header">
                <h2>Latest Updates</h2>
                <span id="update-count" class="badge">Loading...</span>
            </div>
            
            <div id="error-alert" class="alert alert-danger hidden">
                <p>Failed to load release notes. Please try again.</p>
                <button id="retry-btn" class="btn btn-sm btn-outline">Retry</button>
            </div>
            
            <div id="loading-skeleton" class="skeleton-container">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>

            <div id="feed-list" class="feed-list">
                <!-- Release cards will be inserted here dynamically -->
            </div>
        </section>

        <section class="composer-section">
            <div class="sticky-composer">
                <div class="card composer-card">
                    <div class="composer-header">
                        <h3>Tweet Composer</h3>
                        <span class="composer-subtitle">Select an update on the left to compose a tweet.</span>
                    </div>
                    
                    <div class="composer-body">
                        <div class="tweet-preview-container">
                            <div class="tweet-user-meta">
                                <div class="avatar-placeholder">BQ</div>
                                <div>
                                    <div class="user-name">BigQuery Analyst</div>
                                    <div class="user-handle">@bq_updates</div>
                                </div>
                            </div>
                            <textarea id="tweet-textarea" class="tweet-textarea" placeholder="Select an update from the feed or write your tweet here..." maxlength="280"></textarea>
                            
                            <div class="tweet-meta-info">
                                <span id="char-counter" class="char-counter">280</span>
                            </div>
                        </div>

                        <div class="tweet-actions">
                            <button id="tweet-btn" class="btn btn-twitter" disabled>
                                <svg class="twitter-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
                                </svg>
                                Tweet Update
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <div class="container">
                <p>&copy; 2026 BigQuery Release Notes Hub. Powered by Flask & Vanilla Web Tech.</p>
            </div>
        </footer>

        <script src="/static/app.js"></script>
</body>
</html>
